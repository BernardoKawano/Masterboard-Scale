<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<title>Dashboard · Scale Diagnostic</title>
<style>
:root {
  --black: #0A0A0A;
  --black2: #111111;
  --black3: #1A1A1A;
  --yellow: #FBBE0A;
  --yellow-dim: #C99703;
  --white: #FFFFFF;
  --gray: #888888;
  --gray-light: #2A2A2A;
  --danger: #EF4444;
  --warning: #F59E0B;
  --success: #22C55E;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 18% 12%, rgba(251,190,10,0.14), transparent 28%),
    radial-gradient(circle at 88% 18%, rgba(201,151,3,0.10), transparent 26%),
    var(--black);
  color: var(--white);
  font-family: Arial, sans-serif;
}

button,
input,
select {
  font: inherit;
}

.shell {
  width: min(1380px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 28px 0 48px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand img {
  width: 180px;
  height: auto;
}

.kicker {
  color: var(--yellow);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

h1 {
  margin: 5px 0 0;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
}

.meta {
  color: var(--gray);
  font-size: 12px;
  line-height: 1.5;
}

.btn {
  border: 0;
  border-radius: 10px;
  background: var(--yellow);
  color: #000;
  cursor: pointer;
  font-weight: 700;
  padding: 12px 16px;
}

.btn.secondary {
  background: var(--black3);
  border: 1px solid var(--gray-light);
  color: var(--white);
}

.card {
  background: rgba(17,17,17,0.86);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.28);
}

.auth-card {
  max-width: 520px;
  margin: 12vh auto 0;
  padding: 28px;
}

.auth-card label {
  display: block;
  color: var(--gray);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  margin: 22px 0 8px;
  text-transform: uppercase;
}

.auth-card input,
.filter {
  width: 100%;
  background: var(--black3);
  border: 1px solid var(--gray-light);
  border-radius: 10px;
  color: var(--white);
  outline: none;
  padding: 12px 14px;
}

.auth-card input:focus,
.filter:focus {
  border-color: var(--yellow);
}

.metrics {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.metric {
  padding: 18px;
}

.metric-label {
  color: var(--gray);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.metric-value {
  font-size: 34px;
  font-weight: 800;
  margin-top: 8px;
}

.toolbar {
  display: grid;
  grid-template-columns: 1fr 220px auto;
  gap: 12px;
  margin-bottom: 18px;
}

.layout {
  display: grid;
  grid-template-columns: 410px 1fr;
  gap: 18px;
  align-items: start;
}

.list {
  max-height: calc(100vh - 260px);
  overflow: auto;
  padding: 10px;
}

.lead-card {
  width: 100%;
  display: block;
  text-align: left;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 12px;
  color: inherit;
  cursor: pointer;
  margin-bottom: 8px;
  padding: 14px;
}

.lead-card:hover,
.lead-card.active {
  background: rgba(251,190,10,0.08);
  border-color: rgba(251,190,10,0.28);
}

.lead-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.lead-name {
  font-size: 16px;
  font-weight: 800;
}

.lead-company {
  color: var(--gray);
  font-size: 12px;
  margin-top: 3px;
}

.pill {
  border: 1px solid var(--gray-light);
  border-radius: 999px;
  color: var(--gray);
  display: inline-flex;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 5px 8px;
  text-transform: uppercase;
  white-space: nowrap;
}

.pill.completed { border-color: rgba(34,197,94,0.35); color: var(--success); }
.pill.started { border-color: rgba(245,158,11,0.35); color: var(--warning); }
.pill.captured { border-color: rgba(251,190,10,0.35); color: var(--yellow); }
.pill.error { border-color: rgba(239,68,68,0.35); color: var(--danger); }

.lead-facts {
  color: var(--gray);
  display: flex;
  flex-wrap: wrap;
  font-size: 12px;
  gap: 8px;
  margin-top: 12px;
}

.detail {
  min-height: 620px;
  padding: 24px;
}

.empty {
  color: var(--gray);
  padding: 36px;
  text-align: center;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin: 20px 0;
}

.fact {
  background: var(--black3);
  border: 1px solid var(--gray-light);
  border-radius: 12px;
  padding: 14px;
}

.fact-label {
  color: var(--gray);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.fact-value {
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
  word-break: break-word;
}

.score-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 16px;
  margin-top: 20px;
}

.score-box {
  align-items: center;
  background: var(--black3);
  border: 1px solid var(--gray-light);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 150px;
}

.score-number {
  color: var(--yellow);
  font-size: 58px;
  font-weight: 800;
  line-height: 1;
}

.section {
  margin-top: 24px;
}

.section h2 {
  color: var(--gray);
  font-size: 12px;
  letter-spacing: 0.18em;
  margin: 0 0 12px;
  text-transform: uppercase;
}

.copy {
  color: #CCCCCC;
  line-height: 1.7;
  white-space: pre-wrap;
}

.dimensions {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.dimension {
  background: var(--black3);
  border: 1px solid var(--gray-light);
  border-radius: 12px;
  padding: 14px;
}

.dimension-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.dimension-key {
  color: var(--yellow);
  font-weight: 800;
}

.bar {
  background: #262626;
  border-radius: 999px;
  height: 5px;
  margin: 10px 0;
  overflow: hidden;
}

.bar span {
  background: var(--yellow);
  display: block;
  height: 100%;
}

.table-wrap {
  overflow: auto;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th,
td {
  border-top: 1px solid var(--gray-light);
  font-size: 13px;
  line-height: 1.5;
  padding: 12px;
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--gray);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
}

.actions a {
  border: 1px solid var(--gray-light);
  border-radius: 10px;
  color: var(--white);
  display: inline-flex;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 12px;
  text-decoration: none;
}

.actions a.primary {
  background: #25D366;
  border-color: #25D366;
  color: #fff;
}

.error {
  color: var(--danger);
  margin-top: 12px;
}

@media (max-width: 980px) {
  .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .toolbar { grid-template-columns: 1fr; }
  .layout { grid-template-columns: 1fr; }
  .list { max-height: none; }
  .detail-grid,
  .dimensions,
  .score-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="shell">
  <section id="auth" class="auth-card card" hidden>
    <div class="kicker">Scale Diagnostic</div>
    <h1>Dashboard Privado</h1>
    <p class="meta">Digite o token do link privado para acessar leads e diagnosticos.</p>
    <label for="tokenInput">Token</label>
    <input id="tokenInput" type="password" autocomplete="off" placeholder="Cole o token aqui">
    <div class="actions">
      <button class="btn" id="tokenButton" type="button">Entrar</button>
    </div>
    <div id="authError" class="error"></div>
  </section>

  <section id="app" hidden>
    <div class="topbar">
      <div class="brand">
        <img src="assets/masterboard-logo-yellow-transparent.png" alt="Masterboard">
        <div>
          <div class="kicker">Dashboard · Scale Diagnostic</div>
          <h1>Leads e Diagnosticos</h1>
          <div class="meta" id="generatedAt">Carregando...</div>
        </div>
      </div>
      <button class="btn secondary" id="refreshButton" type="button">Atualizar</button>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="toolbar">
      <input id="searchInput" class="filter" type="search" placeholder="Buscar por nome, empresa, email, cidade ou faturamento">
      <select id="statusFilter" class="filter">
        <option value="all">Todos os status</option>
        <option value="completed">Concluidos</option>
        <option value="started">Iniciados</option>
        <option value="captured">Capturados</option>
        <option value="error">Com erro</option>
      </select>
      <button class="btn secondary" id="clearButton" type="button">Limpar filtros</button>
    </div>

    <div class="layout">
      <aside class="card list" id="leadList"></aside>
      <section class="card detail" id="detail"></section>
    </div>
  </section>
</main>

<script>
const state = {
  token: '',
  records: [],
  summaries: [],
  selectedLeadId: '',
  query: '',
  status: 'all',
};

const params = new URLSearchParams(window.location.search);
state.token = params.get('token') || '';

document.getElementById('tokenButton').addEventListener('click', () => {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  state.token = token;
  window.history.replaceState({}, '', `/dashboard.html?token=${encodeURIComponent(token)}`);
  loadDashboard();
});

document.getElementById('refreshButton').addEventListener('click', loadDashboard);
document.getElementById('clearButton').addEventListener('click', () => {
  state.query = '';
  state.status = 'all';
  document.getElementById('searchInput').value = '';
  document.getElementById('statusFilter').value = 'all';
  render();
});
document.getElementById('searchInput').addEventListener('input', (event) => {
  state.query = event.target.value.trim().toLowerCase();
  renderList();
});
document.getElementById('statusFilter').addEventListener('change', (event) => {
  state.status = event.target.value;
  renderList();
});

if (state.token) {
  loadDashboard();
} else {
  showAuth();
}

async function loadDashboard() {
  if (!state.token) return showAuth();
  showApp();
  setDetailLoading();

  try {
    const response = await fetch(`/api/dashboard?token=${encodeURIComponent(state.token)}`, {
      headers: { 'Accept': 'application/json' },
      cache: 'no-store',
    });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(payload.error || 'Nao foi possivel carregar.');

    state.records = Array.isArray(payload.records) ? payload.records : [];
    state.summaries = Array.isArray(payload.summaries) ? payload.summaries : [];
    state.selectedLeadId = state.summaries[0]?.leadId || '';

    document.getElementById('generatedAt').textContent =
      `Atualizado em ${formatDate(payload.generatedAt)} · ${payload.listDurationMs || 0}ms`;

    renderMetrics(payload.metrics || {});
    render();
  } catch (error) {
    document.getElementById('authError').textContent = error.message;
    showAuth();
  }
}

function showAuth() {
  document.getElementById('auth').hidden = false;
  document.getElementById('app').hidden = true;
}

function showApp() {
  document.getElementById('auth').hidden = true;
  document.getElementById('app').hidden = false;
  document.getElementById('authError').textContent = '';
}

function render() {
  renderList();
  renderDetail();
}

function renderMetrics(metrics) {
  const items = [
    ['Total', metrics.total || 0],
    ['Concluidos', metrics.completed || 0],
    ['Iniciados', metrics.started || 0],
    ['Capturados', metrics.captured || 0],
    ['Score medio', metrics.averageScore || 0],
  ];

  document.getElementById('metrics').innerHTML = items.map(([label, value]) => `
    <div class="card metric">
      <div class="metric-label">${escapeHtml(label)}</div>
      <div class="metric-value">${escapeHtml(value)}</div>
    </div>
  `).join('');
}

function renderList() {
  const list = document.getElementById('leadList');
  const visible = filteredSummaries();

  if (!visible.length) {
    list.innerHTML = '<div class="empty">Nenhum lead encontrado.</div>';
    state.selectedLeadId = '';
    renderDetail();
    return;
  }

  if (!visible.some((item) => item.leadId === state.selectedLeadId)) {
    state.selectedLeadId = visible[0].leadId;
  }

  list.innerHTML = visible.map((item) => `
    <button type="button" class="lead-card ${item.leadId === state.selectedLeadId ? 'active' : ''}" data-lead-id="${escapeHtml(item.leadId)}">
      <div class="lead-head">
        <div>
          <div class="lead-name">${escapeHtml(item.nome || 'Lead sem nome')}</div>
          <div class="lead-company">${escapeHtml(item.empresa || item.email || 'Empresa nao informada')}</div>
        </div>
        <span class="pill ${escapeHtml(item.status)}">${labelStatus(item.status)}</span>
      </div>
      <div class="lead-facts">
        <span>${escapeHtml(item.faturamento || 'Faturamento nao informado')}</span>
        <span>${escapeHtml(item.localizacao || 'Localizacao nao informada')}</span>
        ${item.score_geral ? `<span>Score ${escapeHtml(item.score_geral)}</span>` : ''}
      </div>
      <div class="meta" style="margin-top:10px;">${escapeHtml(formatDate(item.updatedAt))}</div>
    </button>
  `).join('');

  list.querySelectorAll('.lead-card').forEach((button) => {
    button.addEventListener('click', () => {
      state.selectedLeadId = button.getAttribute('data-lead-id');
      render();
    });
  });
}

function renderDetail() {
  const detail = document.getElementById('detail');
  const record = state.records.find((item) => item.leadId === state.selectedLeadId);
  if (!record) {
    detail.innerHTML = '<div class="empty">Selecione um lead para ver os detalhes.</div>';
    return;
  }

  const form = record.formData || {};
  const report = record.report || {};
  const phone = report.whatsapp || form.whatsapp || '';
  const email = report.email || form.email || '';
  const dims = report.dimensoes || {};
  const rows = Array.isArray(report.masterboard_tabela) ? report.masterboard_tabela : [];
  const priorities = Array.isArray(report.prioridades) ? report.prioridades : [];

  detail.innerHTML = `
    <div class="lead-head">
      <div>
        <div class="kicker">${escapeHtml(labelStatus(record.status))}</div>
        <h1>${escapeHtml(report.empresa || report.nome || form.nome || 'Lead')}</h1>
        <div class="meta">${escapeHtml(formatDate(record.updatedAt))}</div>
      </div>
      <span class="pill ${escapeHtml(record.status)}">${escapeHtml(record.status)}</span>
    </div>

    <div class="detail-grid">
      ${fact('Nome', report.nome || form.nome)}
      ${fact('Email', email)}
      ${fact('WhatsApp', phone)}
      ${fact('Faturamento', report.faturamento || form.faturamento)}
      ${fact('Localizacao', report.localizacao || form.localizacao)}
      ${fact('Nivel', report.nivel)}
      ${fact('Lead ID', record.leadId)}
      ${fact('Mensagens', record.messageCount || 0)}
    </div>

    ${report.tipo ? `
      <div class="score-row">
        <div class="score-box">
          <div class="metric-label">Score Geral</div>
          <div class="score-number">${escapeHtml(report.score_geral || 0)}</div>
        </div>
        <div class="fact">
          <div class="fact-label">Gargalo Critico</div>
          <div class="copy" style="margin-top:10px;">${escapeHtml(report.gargalo_critico || 'Nao informado')}</div>
        </div>
      </div>

      <div class="section">
        <h2>Dimensoes SCALE</h2>
        <div class="dimensions">
          ${Object.entries(dims).map(([key, dim]) => dimension(key, dim)).join('')}
        </div>
      </div>

      <div class="section">
        <h2>Prioridades</h2>
        <div class="copy">${priorities.length ? escapeHtml(priorities.map((item, index) => `${index + 1}. ${item}`).join('\n')) : 'Nao informado'}</div>
      </div>

      <div class="section">
        <h2>Parecer</h2>
        <div class="copy">${escapeHtml(report.parecer || 'Nao informado')}</div>
      </div>

      <div class="section">
        <h2>Inteligencia Masterboard</h2>
        <div class="copy">${escapeHtml(report.setor_insights || 'Nao informado')}</div>
        ${report.ecossistema_match ? `<div class="copy" style="margin-top:12px;color:var(--yellow);">${escapeHtml(report.ecossistema_match)}</div>` : ''}
      </div>

      ${rows.length ? `
        <div class="section">
          <h2>Tabela Masterboard</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Desafio</th><th>Impacto</th><th>Conexao</th></tr>
              </thead>
              <tbody>
                ${rows.map((row) => `<tr><td>${escapeHtml(row.desafio)}</td><td>${escapeHtml(row.impacto)}</td><td>${escapeHtml(row.conexao)}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      ` : ''}
    ` : '<div class="empty">Lead capturado, mas diagnostico ainda nao concluido.</div>'}

    ${record.error ? `<div class="section"><h2>Erro</h2><div class="copy">${escapeHtml(record.error)}</div></div>` : ''}

    <div class="section">
      <h2>Historico Da Conversa</h2>
      <div class="copy">${escapeHtml(record.conversation || 'Nao disponivel')}</div>
    </div>

    <div class="section">
      <h2>Respostas Do Lead</h2>
      <div class="copy">${escapeHtml(record.answers || 'Nao disponivel')}</div>
    </div>

    <div class="actions">
      ${phone ? `<a class="primary" href="${escapeHtml(whatsappUrl(phone))}" target="_blank" rel="noreferrer">Chamar no WhatsApp</a>` : ''}
      ${email ? `<a href="mailto:${escapeHtml(email)}">Enviar email</a>` : ''}
    </div>
  `;
}

function filteredSummaries() {
  return state.summaries.filter((item) => {
    if (state.status !== 'all' && item.status !== state.status) return false;
    if (!state.query) return true;
    return [
      item.nome,
      item.empresa,
      item.email,
      item.whatsapp,
      item.faturamento,
      item.localizacao,
      item.nivel,
      item.gargalo_critico,
    ].some((value) => String(value || '').toLowerCase().includes(state.query));
  });
}

function setDetailLoading() {
  document.getElementById('metrics').innerHTML = '';
  document.getElementById('leadList').innerHTML = '<div class="empty">Carregando leads...</div>';
  document.getElementById('detail').innerHTML = '<div class="empty">Carregando detalhes...</div>';
}

function fact(label, value) {
  return `
    <div class="fact">
      <div class="fact-label">${escapeHtml(label)}</div>
      <div class="fact-value">${escapeHtml(value || '-')}</div>
    </div>
  `;
}

function dimension(key, dim = {}) {
  const score = Number(dim.score || 0);
  return `
    <div class="dimension">
      <div class="dimension-top">
        <span class="dimension-key">${escapeHtml(key)}</span>
        <strong>${escapeHtml(score)}</strong>
      </div>
      <div class="bar"><span style="width:${Math.max(0, Math.min(100, score))}%"></span></div>
      <div class="copy">${escapeHtml(dim.status || 'Nao informado')}</div>
      ${dim.gargalo ? `<div class="copy" style="color:var(--danger);margin-top:8px;">${escapeHtml(dim.gargalo)}</div>` : ''}
    </div>
  `;
}

function whatsappUrl(phone) {
  const digits = String(phone || '').replace(/\D/g, '');
  const normalized = digits.startsWith('55') ? digits : `55${digits}`;
  return `https://wa.me/${normalized}`;
}

function labelStatus(status) {
  return {
    captured: 'Capturado',
    started: 'Iniciado',
    completed: 'Concluido',
    error: 'Erro',
  }[status] || 'Desconhecido';
}

function formatDate(value) {
  if (!value) return '-';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('pt-BR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
  });
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
</script>
</body>
